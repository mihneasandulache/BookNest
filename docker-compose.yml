services:

  postgres:
    build:
      context: ./postgres
    container_name: booknest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: booknest
      POSTGRES_USER: booknest
      POSTGRES_PASSWORD: booknest_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booknest -d booknest"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: booknest-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/booknest
      SPRING_DATASOURCE_USERNAME: booknest
      SPRING_DATASOURCE_PASSWORD: booknest_secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: booknest-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
