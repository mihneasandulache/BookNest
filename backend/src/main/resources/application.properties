spring.application.name=booknest-backend

# DataSource — values are overridden by env vars in Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booknest}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:booknest}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:booknest_secret}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:changeme-use-a-long-random-secret-in-production}
app.jwt.expiration-ms=86400000
